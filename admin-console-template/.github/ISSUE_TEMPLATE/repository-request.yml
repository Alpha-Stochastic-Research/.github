name: Request a repository
description: Create a governed ASR repository on behalf of an organization team.
title: "[Repository request] "
labels:
  - asr-repository-request
body:
  - type: markdown
    attributes:
      value: |
        The submitter must be an active member of the declared team.
        Requests are validated and provisioned automatically.
  - type: input
    id: team
    attributes:
      label: Requesting team slug
      description: Use the lowercase GitHub team slug shown in the team URL.
      placeholder: asr-researchers
    validations:
      required: true
  - type: input
    id: repository_name
    attributes:
      label: Repository name
      description: Lowercase letters, numbers, dots, underscores and hyphens are supported.
      placeholder: asr-new-research-project
    validations:
      required: true
  - type: input
    id: description
    attributes:
      label: Repository description
      placeholder: Reproducible research implementation and paper artefacts.
    validations:
      required: true
  - type: dropdown
    id: visibility
    attributes:
      label: Visibility
      options:
        - Private
        - Internal
        - Public
      default: 0
    validations:
      required: true
  - type: dropdown
    id: starting_point
    attributes:
      label: Starting point
      options:
        - Blank repository
        - ASR research template
        - ASR Python package template
        - ASR reproducibility template
    validations:
      required: true
  - type: dropdown
    id: incoming_project
    attributes:
      label: Related incoming project
      options:
        - Not linked
        - Bachelier 1900 Theory of speculation
        - VAR vs CVAR
        - Corm paper (Probability Offloading)
        - Staif paper (Modelisation)
        - Systematic Portfolio Allocation And Dynamic Backtesting
        - HRP
        - Deep Hedging
        - Agentic Trading Agent
        - Regime Aware Robust Portfolio Optimisation with Traction Cost Control
        - A perturbation theoretic analysis of turnover in ERC
        - AI powered dynamic financial network analytics FMI WB JP morgan
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Initial maintainers or notes
      description: Add research owners, milestones, data constraints or compliance notes.
