
name: Bug Report
description: Report a bug, error, or unexpected behavior in an ASR repository.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        Please provide a clear and reproducible description of the issue.
        For scientific or numerical bugs, include enough information to reproduce the result.

  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which ASR repository is affected?
      placeholder: asr-theory-of-speculation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the problem clearly.
      placeholder: Explain what happened and why it seems incorrect.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the correct or expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Code Example
      description: If applicable, provide a minimal code example that reproduces the issue.
      render: python
      placeholder: |
        import numpy as np

        # Minimal reproducible example here

  - type: textarea
    id: output
    attributes:
      label: Error Message or Output
      description: Paste the full error message, traceback, or unexpected output.
      render: shell
      placeholder: Paste error message here.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the project is affected?
      options:
        - Python code
        - Numerical simulation
        - Mathematical derivation
        - Documentation
        - LaTeX paper
        - Figures or plots
        - GitHub Actions workflow
        - Repository structure
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide your environment details.
      placeholder: |
        OS: macOS / Linux / Windows
        Python version:
        Package versions:
        Browser, if relevant:
    validations:
      required: false

  - type: textarea
    id: scientific_context
    attributes:
      label: Scientific or Numerical Context
      description: If the bug concerns a mathematical model, simulation, or numerical result, explain the context.
      placeholder: |
        Model:
        Parameters:
        Expected theoretical result:
        Observed numerical result:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add screenshots, figures, references, or any other useful context.
      placeholder: Add any additional context here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: I have provided enough information to reproduce the issue.
          required: true
        - label: I understand that scientific and numerical issues should include assumptions, parameters, and references when relevant.
          required: true
