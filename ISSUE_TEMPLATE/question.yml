name: Question
description: Ask a question about an ASR repository, implementation, model, paper, or research topic.
title: "[Question]: "
labels:
  - question
  - needs-response
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your question.

        Please provide enough context so that the ASR community can give a precise and useful answer.
        For mathematical, numerical, or research-related questions, include formulas, references, parameters,
        or code snippets whenever relevant.

  - type: input
    id: repository
    attributes:
      label: Related Repository
      description: Which ASR repository is your question related to?
      placeholder: asr-theory-of-speculation
    validations:
      required: false

  - type: dropdown
    id: question_type
    attributes:
      label: Question Type
      description: What is your question mainly about?
      options:
        - Usage
        - Installation
        - Python implementation
        - Mathematical derivation
        - Numerical simulation
        - Reproducibility
        - Documentation
        - LaTeX paper
        - Research concept
        - Literature reference
        - GitHub workflow
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Ask your question clearly.
      placeholder: |
        Describe what you would like to understand or clarify.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant background, code, equations, or references.
      placeholder: |
        Repository:
        File or function:
        Equation or model:
        Parameters:
        Reference:
    validations:
      required: false

  - type: textarea
    id: attempted
    attributes:
      label: What Have You Tried?
      description: If applicable, describe what you have already tried or checked.
      placeholder: |
        I have tried...
        I checked...
        I expected...
    validations:
      required: false

  - type: textarea
    id: code
    attributes:
      label: Code Snippet
      description: If your question involves code, include a minimal example.
      render: python
      placeholder: |
        # Optional minimal code example
    validations:
      required: false

  - type: textarea
    id: output
    attributes:
      label: Output or Error Message
      description: If relevant, paste the output, warning, or error message.
      render: shell
      placeholder: |
        Optional output or traceback
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add any papers, books, links, or documentation pages related to your question.
      placeholder: |
        - Author, Title, Year
        - DOI / SSRN / arXiv / GitHub link
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: I have provided enough context for others to understand the question.
          required: true
        - label: I understand that research-related answers may require references, assumptions, or numerical validation.
          required: true
